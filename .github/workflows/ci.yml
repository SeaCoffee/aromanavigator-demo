name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare env
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            {
              echo "NEXT_PUBLIC_APP_URL=http://localhost:3000"
              echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
              echo "NEXT_PUBLIC_API_BASE=http://localhost:3000"
              echo "API_BASE=http://localhost:3000"
              echo "DJANGO_URL=http://localhost:8888"
              echo "NEXTAUTH_URL=http://localhost:3000"
              echo "NEXT_PUBLIC_GOOGLE_CLIENT_ID="
              echo "DJANGO_PROXY_DEBUG=0"
              echo "DJANGO_CLIENT_DEBUG=0"
            } > .env
          fi

      - name: Typecheck
        run: npm exec tsc -- --noEmit

      - name: Unit tests
        run: npm exec vitest run

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: aromanavigator_demo
          MYSQL_USER: user
          MYSQL_PASSWORD: user
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare env
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path
          import secrets

          path = Path(".env")
          values = {}
          for line in path.read_text(encoding="utf-8").splitlines():
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              values[key] = value

          values.update(
              {
                  "SECRET_KEY": secrets.token_urlsafe(64),
                  "DEBUG": "True",
                  "DJANGO_ALLOWED_HOSTS": "localhost,127.0.0.1,testserver",
                  "FRONTEND_URL": "http://localhost:3000",
                  "SESSION_COOKIE_SECURE": "False",
                  "CSRF_COOKIE_SECURE": "False",
                  "CSRF_TRUSTED_ORIGINS": "http://localhost:3000",
                  "CORS_ALLOWED_ORIGINS": "http://localhost:3000",
                  "MYSQL_USER": "root",
                  "MYSQL_PASSWORD": "root",
                  "MYSQL_ROOT_PASSWORD": "root",
                  "MYSQL_DATABASE": "aromanavigator_demo",
                  "MYSQL_TEST_DATABASE": "test_aromanavigator_demo",
                  "HOST": "127.0.0.1",
                  "REDIS_URL": "redis://127.0.0.1:6379/0",
                  "EMAIL_HOST": "localhost",
                  "EMAIL_HOST_USER": "",
                  "EMAIL_HOST_PASSWORD": "",
                  "DEFAULT_FROM_EMAIL": "Aroma Navigator <noreply@localhost>",
                  "MEDIA_ROOT": "storage",
                  "PUBLIC_MEDIA_ROOT": "storage",
                  "PRIVATE_MEDIA_ROOT": "private_storage",
              }
          )

          path.write_text(
              "\n".join(f"{key}={value}" for key, value in values.items()) + "\n",
              encoding="utf-8",
          )
          PY
          grep -Ev '^(#|$)' .env >> "$GITHUB_ENV"

      - name: Django checks
        run: |
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Backend tests
        run: >
          python manage.py test
          apps.auth.tests.test_social_service
          apps.auth.tests.test_google_login
          apps.users.tests.test_register_and_profile_serializers
          apps.users.tests.test_user_profile_contract
          apps.users.tests.test_delete_self
          apps.exchange.tests
          apps.forum.tests.test_antispam_moderation
          apps.comments.tests.test_api
          apps.activity.tests.test_activity_api
          apps.notifications.tests.test_notifications_service
          --keepdb
          --verbosity 1
