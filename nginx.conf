# ---- http-РєРѕРЅС‚РµРєСЃС‚ (РґРѕСЃС‚СѓРїРµРЅ РІ conf.d/*.conf) ----
# РќСѓР¶РµРЅ РґР»СЏ РєРѕСЂСЂРµРєС‚РЅРѕРіРѕ Р°РїРіСЂРµР№РґР° РІРµР±СЃРѕРєРµС‚РѕРІ (HMR Рё С‚.Рї.)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ---- server ----
server {
  listen 80;
  server_name _;

  # Р‘РµР·РѕРїР°СЃРЅРѕСЃС‚СЊ / РїРѕР»РёС‚РёРєР°
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # COOP/COEP РїРѕРґ С‚РІРѕР№ СЃС‚РµРє
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

  # CSP РґР»СЏ dev (HMR + Google)
  add_header Content-Security-Policy "
    default-src 'self';
    img-src 'self' data: https: https://*.gstatic.com https://lh3.googleusercontent.com;
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline';
    connect-src 'self' http: https: ws: wss:;
    frame-src https://accounts.google.com;
    font-src 'self' data:;
  " always;

  # Р’Р°Р¶РЅРѕРµ: СЂРµР·РѕР»РІРёРј СЃРµСЂРІРёСЃС‹ Docker РїРѕ РІСЃС‚СЂРѕРµРЅРЅРѕРјСѓ DNS
  resolver 127.0.0.11 ipv6=off;

  # РџРµСЂРµРјРµРЅРЅР°СЏ РґР»СЏ proxy_pass, С‡С‚РѕР±С‹ СЂРµР·РѕР»РІ СЂР°Р±РѕС‚Р°Р» РІ СЂР°РЅС‚Р°Р№РјРµ
  set $nextapp_upstream http://nextapp:3000;

  # РћР±С‰РёРµ РїСЂРѕРєСЃРё-РЅР°СЃС‚СЂРѕР№РєРё
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Р’РµР±СЃРѕРєРµС‚С‹ / HMR
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # Р§С‚РѕР±С‹ HMR/SSE РЅРµ Р·Р°СЃС‚СЂРµРІР°Р»Рё
  proxy_buffering off;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  client_max_body_size 20m;

  location / {
    proxy_pass $nextapp_upstream;
  }

  # Р’ dev СЃС‚Р°С‚РёРєСѓ С‚РѕР¶Рµ С‡РµСЂРµР· Next Рё Р±РµР· РєСЌС€Р°
  location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|ttf|otf|woff|woff2)$ {
    add_header Cache-Control "no-store";
    proxy_pass $nextapp_upstream;
  }
}
