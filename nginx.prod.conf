map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

  client_max_body_size 64m;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /static/ {
    alias /var/lib/aromanavigator/static/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /userApi/media/ {
    alias /var/lib/aromanavigator/user-media/;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location /userApi/ {
    proxy_pass http://app:8000;
  }

  location = /django-admin {
    return 301 /django-admin/;
  }

  location /django-admin/ {
    proxy_pass http://app:8000;
  }

  location / {
    proxy_pass http://nextapp:3000;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name aromanavigator.com.ua www.aromanavigator.com.ua;

  ssl_certificate /etc/letsencrypt/live/aromanavigator.com.ua/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/aromanavigator.com.ua/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers off;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

  client_max_body_size 64m;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  location /static/ {
    alias /var/lib/aromanavigator/static/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location /userApi/media/ {
    alias /var/lib/aromanavigator/user-media/;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  location /userApi/ {
    proxy_pass http://app:8000;
  }

  location = /django-admin {
    return 301 /django-admin/;
  }

  location /django-admin/ {
    proxy_pass http://app:8000;
  }

  location / {
    proxy_pass http://nextapp:3000;
  }
}
