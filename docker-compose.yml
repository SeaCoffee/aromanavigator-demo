
services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8888:8000"
    restart: "no"
    command: >
      sh -c "python manage.py db_waiter &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 180s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    restart: "no"
    command: >
      sh -c "export DJANGO_SETTINGS_MODULE=configs.settings &&
             celery -A configs worker -l info"

  db:
    image: mysql:8
    env_file:
      - ./backend/.env
    ports:
      - "3308:3306"
    volumes:
      - mysql_demo_data:/var/lib/mysql
    restart: "no"

  redis:
    image: redis:alpine

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  nextapp:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const socket=require('node:net').connect(3000,'127.0.0.1',()=>{socket.end();process.exit(0)});socket.setTimeout(3000,()=>process.exit(1));socket.on('error',()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 4s
      retries: 20
      start_period: 10s

  nginx:
    image: nginx:alpine
    depends_on:
      nextapp:
        condition: service_healthy
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: "no"

volumes:
  mysql_demo_data:
